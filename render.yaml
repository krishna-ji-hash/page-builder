# Render Blueprint — https://render.com/docs/blueprint-spec
# Set secrets in Render Dashboard (Environment), not in this file.
# Copy values from .env.render.example + Aiven connection info.

services:
  - type: web
    name: page-builder
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: MYSQL_SSL
        value: auto
      - key: MYSQL_POOL_LIMIT
        value: "10"
      - key: NEXT_PUBLIC_FLAT_PUBLIC_URLS
        value: "true"
      - key: NEXT_PUBLIC_PUBLIC_PROJECT_SLUG
        value: d
      - key: SITE_URL
        value: https://page-builder-0ano.onrender.com
      - key: BUILDER_APP_HOST
        value: page-builder-0ano.onrender.com
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_EMAIL
        value: admin@localhost
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_NAME
        value: Super Admin
